<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Entry System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0B1120, #1E293B);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(30, 41, 59, 0.5);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 800;
        }

        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        a {
            display: inline-block;
            padding: 12px 24px;
            background: #3B82F6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }

        a:hover {
            background: #2563EB;
            transform: translateY(-2px);
        }

        .admin-link {
            background: #8B5CF6;
        }

        .admin-link:hover {
            background: #7C3AED;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Gate Entry System</h1>
        <p>Search for your society to access the portal</p>

        <div style="margin: 30px 0;">
            <div style="position: relative; max-width: 400px; margin: 0 auto;">
                <input type="text" id="societySearch" placeholder="Type society name..."
                    style="width: 100%; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(15, 23, 42, 0.6); color: white; font-size: 1rem; outline: none; transition: border 0.3s;"
                    autocomplete="off">
                <div id="results"
                    style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: #1E293B; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin-top: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); z-index: 50; max-height: 250px; overflow-y: auto;">
                    <!-- Results here -->
                </div>
            </div>
        </div>

        <div class="links">
            <a href="/admin/" class="admin-link">Admin Dashboard</a>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('societySearch');
        const resultsDiv = document.getElementById('results');
        let debounceTimer;

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearTimeout(debounceTimer);

            if (query.length < 2) {
                resultsDiv.style.display = 'none';
                return;
            }

            debounceTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/societies/search?q=${encodeURIComponent(query)}`);
                    const data = await res.json();

                    if (data.length > 0) {
                        renderResults(data);
                        resultsDiv.style.display = 'block';
                    } else {
                        resultsDiv.innerHTML = '<div style="padding: 15px; color: #94A3B8; font-size: 0.9rem;">No societies found</div>';
                        resultsDiv.style.display = 'block';
                    }
                } catch (err) {
                    console.error('Search failed', err);
                }
            }, 300);
        });

        function renderResults(societies) {
            resultsDiv.innerHTML = societies.map(s => `
                <div class="result-item" onclick="selectSociety('${s.slug}')" 
                    style="padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; text-align: left; transition: background 0.2s;">
                    <div style="font-weight: 600; color: #F8FAFC;">${s.name}</div>
                    <div style="font-size: 0.75rem; color: #94A3B8;">${s.address || 'No address provided'}</div>
                </div>
            `).join('');

            // Add hover styles dynamically
            document.querySelectorAll('.result-item').forEach(item => {
                item.onmouseover = () => item.style.background = 'rgba(255,255,255,0.05)';
                item.onmouseout = () => item.style.background = 'transparent';
            });
        }

        function selectSociety(slug) {
            window.location.href = `/client/${slug}/`;
        }

        // Close results when clicking outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target)) {
                resultsDiv.style.display = 'none';
            }
        });
    </script>
</body>

</html>
