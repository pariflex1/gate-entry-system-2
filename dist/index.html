<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Entry System | Gateway</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid #334155;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #2d3748;
            border-color: var(--primary);
        }

        .card h2 {
            margin: 0 0 10px 0;
            color: var(--primary);
        }

        .card p {
            margin: 0;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .links {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Gate Entry System</h1>
        <p>Select the portal you wish to access below.</p>

        <div class="links">
            <a href="/client/" class="card">
                <h2>Guard Portal</h2>
                <p>Register visitors and manage gate entries.</p>
            </a>
            <a href="/admin/" class="card">
                <h2>Admin Portal</h2>
                <p>Manage societies, units, and guards.</p>
            </a>
        </div>
    </div>
</body>

</html>
